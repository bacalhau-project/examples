[tool:pytest]
# Pytest configuration for BigQuery with Bacalhau project

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v --tb=short --strict-markers --disable-warnings --color=yes

# Test markers for categorizing tests
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that require BigQuery credentials
    config: Configuration-related tests
    smoke: Quick smoke tests for basic functionality
    slow: Tests that take longer to run
    requires_deps: Tests that require full dependency stack (duckdb, pandas, etc.)
    no_deps: Tests that work without external dependencies using mocks

# Minimum version requirements
minversion = 6.0

# Test timeout (in seconds) - prevent hanging tests
timeout = 300

# Filterwarnings - suppress known warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning
    ignore:.*imp module.*:DeprecationWarning

# Test collection - skip files that shouldn't be collected as tests
collect_ignore_glob =
    demo_timestamp_tracking.py
    run_tests.sh
